[recipe]
interpreter = "sh"

[[step]]
run = "mkdir build && cd build"

[[step]]
run = "meson setup --prefix=$XORG_PREFIX --buildtype=release .."

[[step]]
run = "ninja -j$(( $(grep MemTotal /proc/meminfo | awk '{print $2}') / 1024 / 1024 / 2 ))"

[[step]]
run = "sudo ninja install || doas ninja install"
