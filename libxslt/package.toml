[recipe]
name = "libxslt"
version = "1.1.45"
description = "XSLT libraries used for extending libxml2"

[source]
src = "https://download.gnome.org/sources/libxslt/1.1/libxslt-1.1.45.tar.xz"
sha256 = "9acfe68419c4d06a45c550321b3212762d92f41465062ca4ea19e632ee5d216e"
[dependencies]
deps = ["libxml2"]

[build]
system = "autotools"
configure_flags = ["--prefix=/usr", "--disable-static", "--without-python"]
