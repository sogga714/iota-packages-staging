[recipe]
interpreter = "sh"

[[step]]
run = 'mkdir -p lib && cd lib && grep -v "^#" ../lib-7.md5 | awk "{print $2}" | wget -i- -c -B https://www.x.org/pub/individual/lib/ && md5sum -c ../lib-7.md5 && bash -c "as_root() { if [ $EUID = 0 ]; then $*; elif [ -x /usr/bin/sudo ]; then sudo $*; else su -c \"$*\"; fi; }; export -f as_root; for package in $(grep -v \"^#\" ../lib-7.md5 | awk \"{print \$2}\"); do packagedir=\${package%.tar.?z*}; echo \"Building \$packagedir\"; tar -xf \"\$package\"; pushd \"\$packagedir\"; docdir=\"--docdir=\$XORG_PREFIX/share/doc/\$packagedir\"; do_build() { make; }; do_test() { make check; }; do_install() { as_root make install; }; case \$packagedir in libXfont2-[0-9]* ) ./configure \$XORG_CONFIG \$docdir --disable-devel-docs ;; libXt-[0-9]* ) ./configure \$XORG_CONFIG \$docdir --with-appdefaultdir=/etc/X11/app-defaults ;; libXpm-[0-9]* ) ./configure \$XORG_CONFIG \$docdir --disable-open-zfile ;; libpciaccess* | libxkbfile* ) meson setup --prefix=\$XORG_PREFIX --buildtype=release build; do_build() { ninja -C build; }; do_test() { ninja -C build test; }; do_install() { as_root ninja -C build install; }; ;; * ) ./configure \$XORG_CONFIG \$docdir ;; esac; do_build; do_install; unset do_build do_test do_install; popd; rm -rf \"\$packagedir\"; as_root /sbin/ldconfig; done"'
