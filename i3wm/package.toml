name = "i3wm"
version = "4.25.1"
description = "Simple tilling X11 window manager"

[source]
src = "https://i3wm.org/downloads/i3-4.25.1.tar.xz"
sha256 = ""

[dependencies]
runtime = [""]
build = [ "pkgconf", "libXau", "libxcb", "libxkbcommon",  "libev", "yajl",  "perl-pod-simple", "docbook-xml", "pcre", "libstartup-notification", "pango", "cairo"] # ommited asciidoc since the tarball *should* have pregenerated documentation (hopefully)

[build]
system = "meson"
